name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  PNPM_VERSION: "9.15.4"
  NODE_VERSION: "22"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Generate changelog
        id: changelog
        run: |
          # Extract version from tag
          VERSION="${GITHUB_REF_NAME#v}"
          # Generate changelog from git log since last tag
          PREV_TAG=$(git tag --sort=-creatordate | head -n 2 | tail -n 1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-decorate)
          else
            LOG=$(git log --oneline --no-decorate "$PREV_TAG..HEAD")
          fi
          {
            echo "changelog<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$LOG" | while read -r line; do
              echo "- $line"
            done
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false

      - name: Publish to npm (dry-run)
        run: pnpm -r publish --dry-run --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
